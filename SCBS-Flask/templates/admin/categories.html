<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sports Complex Booking System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    display: flex;
    background: #0f1117;
    color: #e6f1ff;
}

/* SIDEBAR */
.sidebar {
    width: 230px;
    height: 100vh;
    background: linear-gradient(180deg, #0f1117, #0a1f2e, #0c2d3f);
    position: fixed;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #1f2a38;
}

.sidebar-header {
    padding: 15px;
    border-bottom: 1px solid #1f2a38;
    color: #00e5ff;
}

.menu {
    padding: 20px 0;
    flex-grow: 1;
}

.menu a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    color: #9fb3c8;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

.menu a:hover,
.menu a.active {
    background: rgba(0, 229, 255, 0.15);
    color: #00e5ff;
    border-left: 3px solid #00e5ff;
}

.menu-title {
    padding: 15px 20px 5px;
    font-size: 11px;
    color: #6b85a6;
    text-transform: uppercase;
}


/* MAIN */
.main {
    margin-left: 230px;
    width: 100%;
}

/* TOPBAR */
.topbar {
    background: #0f1117;
    padding: 12px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1f2a38;
}

.topbar h3 {
    font-size: 18px;
    color: #00e5ff;
}

/* PROFILE MENU */
#profileMenu {
    display:none;
    position:absolute;
    right:0;
    top:45px;
    background:#0f1722;
    border-radius:8px;
    border:1px solid #1f2a38;
    width:150px;
}

#profileMenu a {
    display:block;
    padding:10px;
    color:#cfe8ff;
    text-decoration:none;
}

#profileMenu a:hover {
    background: rgba(0,229,255,0.1);
}

/* CONTENT */
.content {
    padding: 25px;
}

/* TABLE CONTAINER */
.table-container {
    background: linear-gradient(145deg, #0f1117, #111827);
    border: 1px solid #1f2a38;
    border-radius: 12px;
    padding: 20px;
}

/* HEADER */
.table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.table-header h4 {
    color: #00e5ff;
}

/* SEARCH */
.search-box input {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #1f2a38;
    background: #0a0f1a;
    color: #e6f1ff;
    outline: none;
    transition: 0.3s;
}

.search-box input:focus {
    border-color: #00e5ff;
    box-shadow: 0 0 8px rgba(0,229,255,0.3);
}

.search-box input::placeholder {
    color: #6b85a6;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background: #0a1f2e;
}

th {
    color: #00e5ff;
    font-weight: 500;
}

th, td {
    padding: 10px;
    font-size: 13px;
    text-align: left;
}

tbody tr {
    border-top: 1px solid #1f2a38;
    transition: 0.2s;
}

tbody tr:hover {
    background: rgba(0, 229, 255, 0.08);
}

/* ACTION BUTTON */
.action-btn {
    background: linear-gradient(90deg, #00cfff, #00e5ff);
    border: none;
    color: #001018;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
}

/* ACTION MENU */
.action-container {
    position: relative;
}

.action-menu {
    display: none;
    position: absolute;
    right: 0;
    top: 35px;
    background: #0f1722;
    border: 1px solid #1f2a38;
    border-radius: 8px;
    width: 130px;
}

.action-menu button {
    width: 100%;
    padding: 8px;
    background: none;
    border: none;
    color: #cfe8ff;
    text-align: left;
    cursor: pointer;
}

.action-menu button:hover {
    background: rgba(0,229,255,0.1);
}

.action-menu button.delete {
    color: #ff6b6b;
}

/* EMPTY STATE */
.empty-state {
    background: linear-gradient(145deg, #0f1117, #111827);
    border: 1px solid #1f2a38;
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    color: #6b85a6;
}

.empty-state i {
    font-size: 40px;
    color: #00e5ff;
    margin-bottom: 10px;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

.modal-content {
    background: #0f1722;
    margin: 8% auto;
    padding: 20px;
    border-radius: 10px;
    width: 400px;
    border: 1px solid #1f2a38;
    color: #e6f1ff;
}

.form-group {
    margin-bottom: 10px;
}

.form-group label {
    font-size: 13px;
    display: block;
    margin-bottom: 5px;
}

.form-group input,
.form-group textarea,
.form-group select {
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #1f2a38;
    background: #0a0f1a;
    color: #e6f1ff;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 12px;
    font-size: 12px;
    color: #6b85a6;
}

/* RESPONSIVE */
@media(max-width: 600px){
    .sidebar { display: none; }
    .main { margin-left: 0; }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="sidebar-header">
        <h2>SCBS - Admin</h2>
    </div>

    <div class="menu">

        <a href="{{ url_for('dashboard') }}"
        class="{% if active_page == 'dashboard' %}active{% endif %}">
            <i class="fas fa-home"></i> Dashboard
        </a>

        <a href="{{ url_for('reservations') }}"
        class="{% if active_page == 'reservations' %}active{% endif %}">
            <i class="fas fa-calendar-check"></i> Reservations
        </a>

        <div class="menu-title">Management</div>

        <a href="{{ url_for('categories') }}"
        class="{% if active_page == 'categories' %}active{% endif %}">
            <i class="fas fa-layer-group"></i> Categories
        </a>

        <a href="{{ url_for('facilities') }}"
        class="{% if active_page == 'facilities' %}active{% endif %}">
            <i class="fas fa-building"></i> Facilities
        </a>

        <a href="{{ url_for('users') }}"
        class="{% if active_page == 'users' %}active{% endif %}">
            <i class="fas fa-users"></i> Users
        </a>

        <a href="{{ url_for('inquiries') }}"
        class="{% if active_page == 'inquiries' %}active{% endif %}">
            <i class="fas fa-envelope"></i> Inquiries
        </a>

        <div class="menu-title">Logs</div>

        <a href="{{ url_for('transaction_log') }}"
        class="{% if active_page == 'transaction_log' %}active{% endif %}">
            <i class="fas fa-receipt"></i> Transaction Log
        </a>

        <a href="{{ url_for('history_log') }}"
        class="{% if active_page == 'history_log' %}active{% endif %}">
            <i class="fas fa-history"></i> History Log
        </a>

        <div class="menu-title">System</div>

        <a href="{{ url_for('settings') }}"
        class="{% if active_page == 'settings' %}active{% endif %}">
            <i class="fas fa-cog"></i> Settings
        </a>

    </div>

</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <h3>Categories</h3>

        <div class="user" style="position: relative;">
            <img src="https://i.pravatar.cc/40" 
                style="width:35px; height:35px; border-radius:50%; cursor:pointer;" 
                onclick="toggleMenu()">

            <div id="profileMenu">
                <a href="#">Profile</a>
                <a href="#">Settings</a>
                <a href="#" style="color:#ff6b6b;">Logout</a>
            </div>
        </div>
    </div>

    <div class="content">

<div class="table-container">

    <!-- HEADER -->
    <div class="table-header">
        <h4>Categories</h4>

        <div style="display:flex; align-items:center; gap:10px;">
            <!-- SEARCH -->
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchCategory" 
                    placeholder="Search category..." 
                    onkeyup="searchCategory()">
            </div>

            <!-- CREATE BUTTON -->
            <button class="action-btn" onclick="openCreateModal()">
                + Create
            </button>
        </div>
    </div>

    <!-- TABLE -->
    <table class="category-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Date Created</th>
                <th>Category Name</th>
                <th>Description</th>
                <th>Status</th>
                <th style="text-align:center;">Action</th>
            </tr>
        </thead>

        <tbody id="categoryTableBody">
            <tr>
                <td colspan="6" style="text-align:center;">
                    No categories found
                </td>
            </tr>
        </tbody>
    </table>

</div>

    <div class="footer">
        © 2026 Sports Complex Booking System
    </div>

</div>

<script>
function toggleMenu() {
    var menu = document.getElementById("profileMenu");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

window.onclick = function(e) {
    if (!e.target.closest('.user')) {
        document.getElementById("profileMenu").style.display = "none";
    }
}

function loadCategories() {
    fetch('/get_categories')
    .then(res => res.json())
    .then(data => {

        let table = document.getElementById("categoryTableBody");

        if (data.length === 0) {
            table.innerHTML = `
                <tr>
                    <td colspan="6">
                        <div class="empty-state">
                            <i class="fas fa-layer-group"></i>
                            <h3>No Categories Found</h3>
                            <p>Add your first category.</p>
                        </div>
                    </td>
                </tr>
            `;
            return;
        }

        let rows = "";

        data.forEach(cat => {
            rows += `
                <tr>
                    <td>${cat.id}</td>
                    <td>${cat.date_created || '-'}</td>
                    <td>${cat.name}</td>
                    <td>${cat.description || '-'}</td>
                    <td>${cat.status}</td>
                    <td style="text-align:center;">
                        <div class="action-container">
                            <button class="action-btn" onclick="toggleActionMenu(${cat.id})">
                                Actions
                            </button>

                            <div class="action-menu" id="menu-${cat.id}">
                                <button onclick="viewCategory(${cat.id})">View</button>
                                <button onclick="editCategory(${cat.id})">Edit</button>
                                <button class="delete" onclick="deleteCategory(${cat.id})">Delete</button>
                            </div>
                        </div>
                    </td>
                </tr>
            `;
        });

        table.innerHTML = rows;
    });
}

function toggleActionMenu(id) {
    document.querySelectorAll('.action-menu').forEach(menu => {
        if (menu.id !== 'menu-' + id) menu.style.display = 'none';
    });

    let menu = document.getElementById('menu-' + id);
    menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
}

// CLOSE WHEN CLICK OUTSIDE
window.addEventListener('click', function(e){
    if (!e.target.closest('.action-container')) {
        document.querySelectorAll('.action-menu').forEach(menu => {
            menu.style.display = 'none';
        });
    }
});

function searchCategory() {
    let input = document.getElementById("searchCategory").value.toLowerCase();
    let rows = document.querySelectorAll("#categoryTableBody tr");

    rows.forEach(row => {
        let text = row.innerText.toLowerCase();
        row.style.display = text.includes(input) ? "" : "none";
    });
}

function viewCategory(id) {
    alert("View Category ID: " + id);
}

function editCategory(id) {
    alert("Edit Category ID: " + id);
}

function deleteCategory(id) {
    if (confirm("Are you sure you want to delete this category?")) {
        alert("Delete logic not yet implemented.");
    }
}

function openCreateModal() {
    document.getElementById("createModal").style.display = "block";
}

function closeCreateModal() {
    document.getElementById("createModal").style.display = "none";
}

// CLOSE WHEN CLICK OUTSIDE
window.onclick = function(e) {
    const modal = document.getElementById("createModal");
    if (e.target === modal) {
        modal.style.display = "none";
    }
}

document.getElementById("createCategoryForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const data = {
        name: document.getElementById("cat_name").value,
        description: document.getElementById("cat_description").value,
        status: document.getElementById("cat_status").value
    };

    fetch('/add_category', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
        if(res.status === "success"){
            alert("Category added!");
            closeCreateModal();
            loadCategories(); // reload table
        } else {
            alert(res.message);
        }
    });
});

</script>

</body>
</html>
