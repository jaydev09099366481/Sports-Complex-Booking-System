<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sports Complex Booking System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    display: flex;
    background: #f4f8f7;
}

/* SIDEBAR */
.sidebar {
    width: 230px;
    height: 100vh;
    background: linear-gradient(180deg, #205072, #329D9C);
    color: #fff;
    position: fixed;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 4px 0 12px rgba(0,0,0,0.2);
}

.sidebar-header {
    background: #205072;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.sidebar-header img {
    width: 32px;
    height: 32px;
    border-radius: 50%;
}

.sidebar-header h2 {
    font-size: 14px;
}

/* MENU */
.menu {
    padding: 20px 0;
    flex-grow: 1;
}

.menu a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    color: #eaf6f6;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

.menu a:hover,
.menu a.active {
    background: rgba(255,255,255,0.2);
    color: #fff;
    border-radius: 6px;
}

.menu-title {
    padding: 15px 20px 5px;
    font-size: 11px;
    color: #cfeeee;
    text-transform: uppercase;
}

/* LOGOUT */
.logout {
    padding: 12px 20px;
    border-top: 1px solid rgba(255,255,255,0.2);
}

.logout a {
    color: #ffdddd;
}

/* MAIN */
.main {
    margin-left: 230px;
    width: 100%;
}

.topbar {
    background: #205072;
    padding: 12px 25px; /* MATCHED HEIGHT */
    display: flex;
    justify-content: space-between;
    align-items: center; /* keeps content vertically centered */
    border-bottom: none;
    height: 56px; /* optional: locks exact height for consistency */
}

.topbar h3 {
    font-size: 18px;
    color: #fff;
}

/* CONTENT */
.content {
    padding: 25px;
}


/* FOOTER */
.footer {
    text-align: center;
    padding: 12px;
    font-size: 12px;
    color: #777;
}

/* RESPONSIVE */
@media(max-width: 900px){
    .cards {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media(max-width: 600px){
    .sidebar { display: none; }
    .main { margin-left: 0; }
}
</style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="sidebar-header">
            <img>
            <h2>SCBS - Admin</h2>
        </div>

     <div class="menu">

        <a href="{{ url_for('dashboard') }}"
        class="{% if active_page == 'dashboard' %}active{% endif %}">
            <i class="fas fa-home"></i> Dashboard
        </a>

        <a href="{{ url_for('reservations') }}"
        class="{% if active_page == 'reservations' %}active{% endif %}">
            <i class="fas fa-calendar-check"></i> Reservations
        </a>

        <div class="menu-title">Management</div>

        <a href="{{ url_for('categories') }}"
        class="{% if active_page == 'categories' %}active{% endif %}">
            <i class="fas fa-layer-group"></i> Categories
        </a>

        <a href="{{ url_for('facilities') }}"
        class="{% if active_page == 'facilities' %}active{% endif %}">
            <i class="fas fa-building"></i> Facilities
        </a>

        <a href="{{ url_for('users') }}"
        class="{% if active_page == 'users' %}active{% endif %}">
            <i class="fas fa-users"></i> Users
        </a>

        <a href="{{ url_for('inquiries') }}"
        class="{% if active_page == 'inquiries' %}active{% endif %}">
            <i class="fas fa-envelope"></i> Inquiries
        </a>

        <div class="menu-title">Logs</div>

        <a href="{{ url_for('transaction_log') }}"
        class="{% if active_page == 'transaction_log' %}active{% endif %}">
            <i class="fas fa-receipt"></i> Transaction Log
        </a>

        <a href="{{ url_for('history_log') }}"
        class="{% if active_page == 'history_log' %}active{% endif %}">
            <i class="fas fa-history"></i> History Log
        </a>

        <div class="menu-title">System</div>

        <a href="{{ url_for('settings') }}"
        class="{% if active_page == 'settings' %}active{% endif %}">
            <i class="fas fa-cog"></i> Settings
        </a>

    </div>

</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <h3>Settings</h3>

        <div class="user" style="position: relative;">
            <img src="https://i.pravatar.cc/40" 
                style="width:35px; height:35px; border-radius:50%; cursor:pointer;" 
                onclick="toggleMenu()">

            <div id="profileMenu" style="
                display:none;
                position:absolute;
                right:0;
                top:45px;
                background:#fff;
                border-radius:8px;
                box-shadow:0 5px 15px rgba(0,0,0,0.15);
                width:150px;
                overflow:hidden;
            ">
                <a href="#" style="display:block; padding:10px; text-decoration:none; color:#333;">Profile</a>
                <a href="#" style="display:block; padding:10px; text-decoration:none; color:#333;">Settings</a>
                <a href="#" style="display:block; padding:10px; text-decoration:none; color:#e74c3c;">Logout</a>
            </div>
        </div>
    </div>

    <div class="content">



    </div>

    <div class="footer">
        © 2026 Sports Complex Booking System
    </div>

</div>

<script>
function toggleMenu() {
    var menu = document.getElementById("profileMenu");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

window.onclick = function(e) {
    if (!e.target.closest('.user')) {
        document.getElementById("profileMenu").style.display = "none";
    }
}

</script>

</body>
</html>
